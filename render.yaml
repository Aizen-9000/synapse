services:
  - type: web
    name: synapse-auth
    runtime: python
    region: singapore          # closest to India
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a secure random value
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRY_DAYS
        value: "30"
      - key: JWT_REFRESH_BEFORE_DAYS
        value: "7"
      - key: DATABASE_URL
        fromDatabase:
          name: synapse-auth-db
          property: connectionString
      - key: RAZORPAY_KEY_ID
        sync: false            # you set this manually in Render dashboard
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: PLAN_BASIC_ID
        sync: false
      - key: PLAN_PRO_ID
        sync: false
      - key: ENV
        value: production
      - key: PORT
        value: "9000"
      - key: HOST
        value: "0.0.0.0"
      - key: BILLING_CYCLE_DAYS
        value: "31"

databases:
  - name: synapse-auth-db
    plan: free
    region: singapore
